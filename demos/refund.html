<!DOCTYPE html>  
  
<html lang="zh-Hant">  
<head>  
<meta charset="UTF-8">  
<title>訂金退款計算器</title>  
<style>  
  * { box-sizing: border-box; }  
  html, body {  
    margin: 0;  
    padding: 0;  
    font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;  
    font-size: 14px;  
    min-height: 100vh;  
    background: #0a1128;  
    color: #eef1fa;  
    position: relative;  
    overflow-x: hidden;  
  }  
  
#stars {  
position: fixed;  
top: 0; left: 0;  
width: 100%; height: 100%;  
z-index: 0;  
background: radial-gradient(ellipse at top, #101c44 0%, #060a1c 70%);  
}  
  
.wrap {  
position: relative;  
z-index: 1;  
max-width: 560px;  
margin: 40px auto;  
padding: 28px 32px 34px;  
background: rgba(15, 23, 55, 0.72);  
border: 1px solid rgba(255,255,255,0.12);  
border-radius: 14px;  
box-shadow: 0 8px 40px rgba(0,0,0,0.45);  
backdrop-filter: blur(6px);  
}  
  
h1 {  
font-size: 18px;  
font-weight: bold;  
text-align: center;  
margin: 0 0 6px;  
letter-spacing: 1px;  
color: #ffffff;  
}  
.sub {  
text-align: center;  
color: #9fb0d8;  
margin: 0 0 22px;  
font-size: 12px;  
}  
  
.row {  
display: flex;  
gap: 14px;  
margin-bottom: 14px;  
}  
.field {  
flex: 1;  
display: flex;  
flex-direction: column;  
gap: 6px;  
}  
label {  
color: #b9c4e6;  
font-size: 13px;  
}  
input {  
font-family: inherit;  
font-size: 14px;  
padding: 9px 10px;  
border-radius: 8px;  
border: 1px solid rgba(255,255,255,0.18);  
background: rgba(255,255,255,0.06);  
color: #ffffff;  
outline: none;  
transition: border-color 0.2s, background 0.2s;  
}  
input:focus {  
border-color: #6c8cff;  
background: rgba(255,255,255,0.1);  
}  
input[readonly] {  
color: #ffd479;  
font-weight: bold;  
background: rgba(255,255,255,0.03);  
}  
  
.divider {  
height: 1px;  
background: rgba(255,255,255,0.12);  
margin: 18px 0;  
}  
  
.result-highlight input {  
color: #7CFFB2;  
font-weight: bold;  
font-size: 16px;  
}  
  
.note {  
margin-top: 20px;  
padding: 12px 14px 12px 28px;  
background: rgba(255,255,255,0.04);  
border-left: 3px solid #6c8cff;  
border-radius: 6px;  
color: #a9b6de;  
font-size: 12px;  
line-height: 1.8;  
}  
.note-title {  
margin: 0 0 6px -14px;  
color: #c7d1f0;  
font-weight: bold;  
}  
.note ul {  
margin: 0;  
padding-left: 1.1em;  
}  
.note li {  
margin-bottom: 2px;  
}  
  
.error {  
color: #ff8080;  
font-size: 12px;  
text-align: center;  
min-height: 16px;  
margin-top: -6px;  
margin-bottom: 8px;  
}  
</style>  
  
</head>  
<body>  
  
<canvas id="stars"></canvas>  
  
<div class="wrap">  
  <h1>訂金退款計算器</h1>  
  <p class="sub">依定型化契約取消政策自動試算</p>  
  
  <div class="row">  
    <div class="field">  
      <label>入住日期</label>  
      <input type="date" id="checkinDate">  
    </div>  
    <div class="field">  
      <label>取消日期</label>  
      <input type="date" id="cancelDate">  
    </div>  
  </div>  
  
  <div class="row">  
    <div class="field">  
      <label>取消天數</label>  
      <input type="text" id="cancelDays" readonly>  
    </div>  
    <div class="field">  
      <label>扣訂金%數</label>  
      <input type="text" id="deductRate" readonly>  
    </div>  
  </div>  
  
  <div class="divider"></div>  
  
  <div class="row">  
    <div class="field">  
      <label>房價</label>  
      <input type="number" id="roomPrice" placeholder="請輸入房價" min="0">  
    </div>  
    <div class="field">  
      <label>訂金（房價×30%）</label>  
      <input type="text" id="deposit" readonly>  
    </div>  
  </div>  
  
  <div class="row">  
    <div class="field">  
      <label>沒收金額</label>  
      <input type="text" id="forfeited" readonly>  
    </div>  

  </div>  

  <div class="row">  
    <div class="field result-highlight">  
      <label>退款金額（匯全額）</label>  
      <input type="text" id="refundall" readonly>  
    </div>  
    <div class="field result-highlight">  
      <label>退款金額（只匯訂金）</label>  
      <input type="text" id="refundpart" readonly>  
    </div> 
</div>
  
  <div class="error" id="errorMsg"></div>  
  
  <div class="note">  
    <p class="note-title">取消政策</p>  
    <ul>  
      <li>入住當天取消，不退費</li>  
      <li>入住前1天取消，扣訂金80%</li>  
      <li>入住前2-3天取消，扣訂金70%</li>  
      <li>入住前4-6天取消，扣訂金60%</li>  
      <li>入住前7-9天取消，扣訂金50%</li>  
      <li>入住前10-13天取消，扣訂金30%</li>  
      <li>入住前14天（含）以上取消，訂金扣0%</li>  
    </ul>  
    <p style="margin:8px 0 0;">※所有金額四捨五入至整數</p>  
  </div>  
</div>  
  
<script>  
// ---------- 星空背景 ----------  
const canvas = document.getElementById('stars');  
const ctx = canvas.getContext('2d');  
let w, h, stars;  
  
function resize() {  
  w = canvas.width = window.innerWidth;  
  h = canvas.height = window.innerHeight;  
}  
window.addEventListener('resize', resize);  
resize();  
  
function makeStar() {  
  return {  
    x: Math.random() * w,  
    y: Math.random() * -h,  
    r: Math.random() * 1.6 + 0.4,  
    speed: Math.random() * 1.2 + 0.4,  
    opacity: Math.random() * 0.6 + 0.4  
  };  
}  
stars = Array.from({ length: 140 }, makeStar);  
  
function animate() {  
  ctx.clearRect(0, 0, w, h);  
  for (const s of stars) {  
    ctx.beginPath();  
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);  
    ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;  
    ctx.fill();  
    s.y += s.speed;  
    if (s.y > h) {  
      s.x = Math.random() * w;  
      s.y = -5;  
    }  
  }  
  requestAnimationFrame(animate);  
}  
animate();  
  
// ---------- 計算邏輯 ----------  
const checkinEl = document.getElementById('checkinDate');  
const cancelEl = document.getElementById('cancelDate');  
const daysEl = document.getElementById('cancelDays');  
const rateEl = document.getElementById('deductRate');  
const priceEl = document.getElementById('roomPrice');  
const depositEl = document.getElementById('deposit');  
const forfeitedEl = document.getElementById('forfeited');  
const refundallEl = document.getElementById('refundall');  
const refundpartEl = document.getElementById('refundpart');  
const errorEl = document.getElementById('errorMsg');  
  
function getDeductRate(days) {  
  if (days <= 0) return 100;  
  if (days === 1) return 80;  
  if (days >= 2 && days <= 3) return 70;  
  if (days >= 4 && days <= 6) return 60;  
  if (days >= 7 && days <= 9) return 50;  
  if (days >= 10 && days <= 13) return 30;  
  return 0; // 14天以上  
}  
  
function formatMoney(n) {  
  return Math.round(n).toLocaleString('zh-Hant');  
}  
  
function calculate() {  
  errorEl.textContent = '';  
  const checkin = checkinEl.value;  
  const cancel = cancelEl.value;  
  const price = parseFloat(priceEl.value);  
  
  if (!checkin || !cancel) {  
    daysEl.value = '';  
    rateEl.value = '';  
    depositEl.value = '';  
    forfeitedEl.value = '';  
    refundallEl.value = '';  
    refundpartEl.value = '';  
    return;  
  }  
  
  const d1 = new Date(checkin + 'T00:00:00');  
  const d2 = new Date(cancel + 'T00:00:00');  
  const diffDays = Math.round((d1 - d2) / (1000 * 60 * 60 * 24));  
  
  if (diffDays < 0) {  
    errorEl.textContent = '取消日期不可晚於入住日期';  
    daysEl.value = '';  
    rateEl.value = '';  
    depositEl.value = '';  
    forfeitedEl.value = '';  
    refundallEl.value = '';  
    refundpartEl.value = '';  
    return;  
  }  
  
  const rate = getDeductRate(diffDays);  
  daysEl.value = diffDays + ' 天';  
  rateEl.value = rate + '%';  
  
  if (isNaN(price) || price < 0) {  
    depositEl.value = '';  
    forfeitedEl.value = '';  
    refundallEl.value = '';  
    refundpartEl.value = '';  
    return;  
  }  
  
  const deposit = price * 0.3;  
  const forfeited = deposit * (rate / 100);  
  const refundall = price - forfeited;  
  const refundpart = deposit - forfeited;  
  
  depositEl.value = formatMoney(deposit);  
  forfeitedEl.value = formatMoney(forfeited);  
  refundallEl.value = formatMoney(refundall);  
  refundpartEl.value = formatMoney(refundpart);  
}  
  
[checkinEl, cancelEl, priceEl].forEach(el => el.addEventListener('input', calculate));  
</script>  
  
</body>  
</html>
